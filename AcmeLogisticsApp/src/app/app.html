<!-- SideNavBar Anchor -->
<app-sidebar (openSettings)="openSettingsModal()"></app-sidebar>

<!-- TopAppBar Anchor Navbar -->
<app-navbar></app-navbar>

<!-- Main Content Canvas -->
<main class="pt-24 pl-24 pr-margin-desktop pb-margin-desktop min-h-screen">
  <div class="max-w-[1600px] mx-auto">
    <div class="flex flex-col lg:flex-row gap-gutter">
      <!-- Dashboard Grid -->
      <div class="flex-1">
        <div class="mb-8">
          <h2 class="font-headline-md text-headline-md text-on-surface">Acme Logistics Overview</h2>
          <p class="font-body-md text-body-md text-on-surface-variant">Real-time status across all deployed sensor
            clusters.</p>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-2 gap-gutter">
          <!-- Temperature Card -->
          <app-device-card></app-device-card>
          

        </div>
      </div>
      <!-- Recent Alerts Sidebar -->
      <aside class="w-full lg:w-80 flex flex-col gap-gutter">
        <div class="glass-card p-6 rounded-xl flex-1 flex flex-col">
          <div class="flex items-center justify-between mb-6">
            <h3 class="font-headline-sm text-headline-sm">Recent Alerts</h3>
            <span
              class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:text-primary transition-colors"
              data-icon="history">history</span>
          </div>
          <div class="space-y-4 overflow-y-auto max-h-[600px] pr-2">
            <ng-container *ngIf="alerts$ | async as alerts">
              <app-alert-card
                *ngFor="let alert of alerts; trackBy: trackByBlob"
                [alert]="alert"
                (acknowledge)="onAcknowledge($event)">
              </app-alert-card>
              <p *ngIf="alerts.length === 0"
                 class="text-sm text-on-surface-variant text-center py-4">
                No active alerts.
              </p>
            </ng-container>
          </div>
        </div>
      </aside>
    </div>
  </div>
</main>
<!-- Floating Action Button (FAB) - Suppression Logic applied where necessary, here relevant for 'Add Device' -->
<button
  class="fixed bottom-10 right-10 w-16 h-16 bg-secondary text-on-secondary rounded-full shadow-[0_8px_30px_rgb(78,222,163,0.3)] hover:scale-110 active:scale-95 transition-all flex items-center justify-center group z-50">
  <span class="material-symbols-outlined text-3xl" data-icon="add">add</span>
  <span
    class="absolute right-20 bg-surface-container-high px-4 py-2 rounded-lg text-sm font-bold text-white opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity whitespace-nowrap border border-outline-variant">Deploy
    New Node</span>
</button>
<script>
  // Micro-interactions for hover effects on glass cards
  document.querySelectorAll('.glass-card').forEach(card => {
    card.addEventListener('mousemove', (e) => {
      const rect = card.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      card.style.setProperty('--mouse-x', `${x}px`);
      card.style.setProperty('--mouse-y', `${y}px`);
    });
  });

  // Simulating live data updates
  setInterval(() => {
    const temps = document.querySelectorAll('.font-data-mono');
    temps.forEach(temp => {
      if (temp.innerText.includes('°C')) {
        const current = parseFloat(temp.innerText);
        const change = (Math.random() - 0.5) * 0.2;
        temp.innerText = (current + change).toFixed(1) + '°C';
      }
    });
  }, 3000);
</script>





<div *ngIf="settingsOpen()" class="fixed inset-0 z-[9999] grid place-items-center bg-black/60 backdrop-blur-sm p-4">
  <div class="absolute inset-0" (click)="closeSettingsModal()"></div>
  <div class="relative z-10 w-full max-w-xl max-h-[80vh] overflow-hidden rounded-2xl bg-surface text-on-surface shadow-[0_24px_60px_rgba(0,0,0,0.3)] border border-outline-variant/20">
    <div class="flex items-center justify-between border-b border-outline-variant/20 px-5 py-3 bg-surface-container-highest">
      <div>
        <p class="text-on-surface-variant text-[10px] uppercase tracking-[0.16em]">Configuration</p>
        <h2 class="font-title-md text-base font-semibold">System Settings</h2>
      </div>
      <button class="rounded-full p-1.5 text-on-surface hover:bg-surface-container-lowest" type="button" (click)="closeSettingsModal()">
        <span class="material-symbols-outlined text-xl">close</span>
      </button>
    </div>
    <div class="overflow-y-auto max-h-[calc(80vh-4rem)] p-5 bg-surface-container-highest">
      <app-settings></app-settings>
    </div>
  </div>
</div>

<router-outlet />
